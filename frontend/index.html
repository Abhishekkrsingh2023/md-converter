<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>md → export</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    * {
      scrollbar-width: none;
    }

    *::-webkit-scrollbar {
      display: none;
    }

    :root {
      --bg: #080A12;
      --accent: #7C6FFF;
      --accent-soft: #5B52CC;
      --accent-glow: rgba(124, 111, 255, 0.22);
      --accent-glow2: rgba(124, 111, 255, 0.10);

      /* Glass layers */
      --glass-bg: rgba(255, 255, 255, 0.045);
      --glass-bg-hi: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-border-hi: rgba(255, 255, 255, 0.18);
      --glass-inset: rgba(255, 255, 255, 0.13);
      /* top-edge gloss line */

      --text: #E8EAF4;
      --text-dim: #9CA3BF;
      --muted: #4E546E;
      --success: #4ADE80;
      --error: #F87171;

      --radius-card: 20px;
      --radius: 10px;
      --blur: blur(28px) saturate(160%);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ambient background orbs ── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(100, 88, 255, 0.18) 0%, transparent 70%);
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(10px);
    }

    body::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(80, 60, 200, 0.11) 0%, transparent 70%);
      bottom: -100px;
      right: 20%;
      filter: blur(8px);
    }

    /* ── Layout ── */
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 24px 88px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      font-family: var(--mono);
      font-size: 21px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
      text-shadow: 0 0 18px var(--accent-glow);
    }

    .tagline {
      margin-top: 7px;
      font-size: 12.5px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    /* ── Main card — frosted glass ── */
    .card {
      width: 100%;
      max-width: 720px;
      position: relative;

      /* Glass base */
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);

      /* Layered border: outer edge + inset top gloss line */
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      overflow: hidden;

      /* Shadows: soft outer glow + depth shadow */
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 1px 0 0 var(--glass-inset) inset,
        /* ← macOS top-gloss line */
        0 2px 0 0 rgba(0, 0, 0, 0.25) inset,
        0 32px 80px rgba(0, 0, 0, 0.55),
        0 0 60px rgba(124, 111, 255, 0.07);
    }

    /* Very subtle noise grain for tactile glass feel */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 160px 160px;
      opacity: 0.022;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Tab bar ── */
    .tab-bar {
      position: relative;
      z-index: 1;
      display: flex;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.18);
    }

    .tab-btn {
      flex: 1;
      padding: 14px 0;
      font-family: var(--sans);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      letter-spacing: 0.04em;
      position: relative;
    }

    .tab-btn.active {
      color: var(--text);
      background: rgba(124, 111, 255, 0.06);
    }

    /* Active tab indicator — slim glowing line */
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      right: 20%;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow), 0 0 4px var(--accent);
    }

    .tab-btn:not(.active):hover {
      color: var(--text-dim);
    }

    /* ── Tab panels ── */
    .tab-panel {
      display: none;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .tab-panel.active {
      display: block;
    }

    /* ── Textarea / Editor ── */
    .editor-wrap {
      position: relative;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(4px);
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset;
    }

    .editor-wrap:focus-within {
      border-color: rgba(124, 111, 255, 0.45);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.06) inset,
        0 0 0 3px rgba(124, 111, 255, 0.14),
        0 0 20px rgba(124, 111, 255, 0.08);
    }

    .editor-label {
      position: absolute;
      top: 11px;
      right: 13px;
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0.7;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 300px;
      padding: 16px;
      background: transparent;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.75;
      border: none;
      outline: none;
      resize: vertical;
      tab-size: 2;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    /* ── Drop zone ── */
    .dropzone {
      border: 1px dashed rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      background: rgba(0, 0, 0, 0.18);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.05) inset;
      position: relative;
    }

    .dropzone:hover {
      border-color: rgba(124, 111, 255, 0.35);
      background: rgba(124, 111, 255, 0.04);
    }

    .dropzone.over {
      border-color: var(--accent);
      background: rgba(124, 111, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(124, 111, 255, 0.12), 0 1px 0 rgba(255, 255, 255, 0.05) inset;
    }

    .dropzone.has-file {
      border-color: rgba(74, 222, 128, 0.4);
      background: rgba(74, 222, 128, 0.04);
    }

    .drop-icon {
      font-size: 28px;
      margin-bottom: 12px;
      display: block;
      opacity: 0.5;
    }

    .drop-title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
    }

    .drop-sub {
      margin-top: 4px;
      font-size: 11.5px;
      color: var(--muted);
    }

    .file-input {
      display: none;
    }

    .file-name {
      display: none;
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--success);
    }

    .file-name.visible {
      display: block;
    }

    /* ── Format row ── */
    .format-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
    }

    .format-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* Pill toggle — glass style */
    .format-toggle {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset;
    }

    .fmt-btn {
      padding: 5px 22px;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .fmt-btn.selected {
      background: linear-gradient(160deg, rgba(124, 111, 255, 0.95) 0%, rgba(90, 75, 210, 0.95) 100%);
      color: #fff;
      /* Gloss sheen inside button */
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.28) inset,
        0 -1px 0 rgba(0, 0, 0, 0.2) inset,
        0 0 14px rgba(124, 111, 255, 0.4),
        0 2px 8px rgba(80, 60, 200, 0.35);
    }

    .fmt-btn:not(.selected):hover {
      color: var(--text-dim);
    }

    /* ── Filename input ── */
    .filename-wrap {
      margin-top: 18px;
      position: relative;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(4px);
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset;
    }

    .filename-wrap:focus-within {
      border-color: rgba(124, 111, 255, 0.45);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.06) inset,
        0 0 0 3px rgba(124, 111, 255, 0.14),
        0 0 20px rgba(124, 111, 255, 0.08);
    }

    .filename-input {
      display: block;
      width: 100%;
      padding: 11px 14px;
      background: transparent;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      border: none;
      outline: none;
    }

    .filename-input::placeholder {
      color: var(--muted);
    }

    /* ── Convert button ── */
    .convert-btn {
      margin-top: 18px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(160deg, #7C6FFF 0%, #5A4BD2 100%);
      color: #fff;
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.025em;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, box-shadow 0.2s, transform 0.12s;

      /* Glass gloss on the button */
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.22) inset,
        0 -1px 0 rgba(0, 0, 0, 0.2) inset,
        0 4px 20px rgba(124, 111, 255, 0.3),
        0 1px 4px rgba(0, 0, 0, 0.3);
    }

    /* Subtle top-gloss sweep */
    .convert-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 48%;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.12), transparent);
      border-radius: var(--radius) var(--radius) 0 0;
      pointer-events: none;
    }

    .convert-btn:not(:disabled):hover {
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.22) inset,
        0 -1px 0 rgba(0, 0, 0, 0.2) inset,
        0 6px 28px rgba(124, 111, 255, 0.45),
        0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .convert-btn:not(:disabled):active {
      transform: scale(0.99);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.12) inset,
        0 -1px 0 rgba(0, 0, 0, 0.2) inset,
        0 2px 10px rgba(124, 111, 255, 0.3);
    }

    .convert-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .convert-btn .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }

    .convert-btn.loading .spinner {
      display: block;
    }

    .convert-btn.loading .btn-text::after {
      content: "Converting…";
    }

    .convert-btn:not(.loading) .btn-text::after {
      content: "Convert & Download";
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Status bar ── */
    .status {
      margin-top: 12px;
      min-height: 20px;
      font-size: 11.5px;
      text-align: center;
      border-radius: 6px;
      padding: 3px 10px;
      transition: opacity 0.3s;
      opacity: 0;
    }

    .status.show {
      opacity: 1;
    }

    .status.ok {
      color: var(--success);
    }

    .status.err {
      color: var(--error);
    }

    /* ── Divider between sections inside panel ── */
    .panel-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 20px 0;
    }

    /* ── Footer ── */
    footer {
      margin-top: 28px;
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
      opacity: 0.7;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      opacity: 0.85;
    }

    footer a:hover {
      opacity: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .shell {
        padding: 32px 14px 64px;
      }

      .card {
        border-radius: 16px;
      }

      .tab-panel {
        padding: 18px;
      }

      .format-row {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation: none;
      }

      * {
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header>
      <div class="logo" style="font-size: 24px;">md <span>→</span> export</div>
      <div class="tagline">Paste or upload Markdown · Convert to PDF or DOCX</div>
    </header>

    <div class="card">
      <!-- Tabs -->
      <div class="tab-bar" role="tablist">
        <button class="tab-btn active" role="tab" aria-selected="true" data-tab="text">Paste text</button>
        <button class="tab-btn" role="tab" aria-selected="false" data-tab="file">Upload file</button>
      </div>

      <!-- Paste panel -->
      <div class="tab-panel active" id="panel-text">
        <div class="editor-wrap">
          <span class="editor-label">markdown</span>
          <textarea id="md-input"
            placeholder="# Hello World&#10;&#10;Write your **Markdown** here. Math: $E = mc^2$&#10;&#10;- item one&#10;- item two"></textarea>
        </div>

        <div class="format-row">
          <span class="format-label">Output format</span>
          <div class="format-toggle" id="toggle-text" role="group" aria-label="Output format">
            <button class="fmt-btn selected" data-fmt="pdf">PDF</button>
            <button class="fmt-btn" data-fmt="docx">DOCX</button>
          </div>
        </div>

        <div class="filename-wrap">
          <input type="text" class="filename-input" id="filename-text" placeholder="File name (optional, e.g. my-document)" />
        </div>

        <button class="convert-btn" id="btn-text">
          <span class="btn-inner">
            <span class="spinner"></span>
            <span class="btn-text"></span>
          </span>
        </button>
        <div class="status" id="status-text"></div>
      </div>

      <!-- File upload panel -->
      <div class="tab-panel" id="panel-file">
        <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Upload markdown file">
          <span class="drop-icon">📄</span>
          <div class="drop-title">Drop a .md file here</div>
          <div class="drop-sub">or click to browse</div>
          <div class="file-name" id="file-name"></div>
        </div>
        <input type="file" id="file-input" class="file-input" accept=".md,.markdown,text/markdown,text/plain" />

        <div class="format-row">
          <span class="format-label">Output format</span>
          <div class="format-toggle" id="toggle-file" role="group" aria-label="Output format">
            <button class="fmt-btn selected" data-fmt="pdf">PDF</button>
            <button class="fmt-btn" data-fmt="docx">DOCX</button>
          </div>
        </div>

        <div class="filename-wrap">
          <input type="text" class="filename-input" id="filename-file" placeholder="File name (optional, defaults to uploaded file name)" />
        </div>

        <button class="convert-btn" id="btn-file" disabled>
          <span class="btn-inner">
            <span class="spinner"></span>
            <span class="btn-text"></span>
          </span>
        </button>
        <div class="status" id="status-file"></div>
      </div>
    </div>

    <footer style="font-size: medium;">
      © 2026 Abhishek · md → export &nbsp;·&nbsp; Powered by <a href="https://pandoc.org" target="_blank"
        rel="noopener">Pandoc</a> + XeLaTeX
    </footer>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    const API_BASE = "";   // Empty = same origin. Set to "http://localhost:8000" for dev.

    // ── Tab switching ────────────────────────────────────────────────────────
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => {
          b.classList.remove("active");
          b.setAttribute("aria-selected", "false");
        });
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        btn.setAttribute("aria-selected", "true");
        document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
      });
    });

    // ── Format toggles ───────────────────────────────────────────────────────
    const selectedFmt = { text: "pdf", file: "pdf" };

    document.querySelectorAll(".format-toggle").forEach(toggle => {
      const group = toggle.id.replace("toggle-", "");
      toggle.querySelectorAll(".fmt-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          toggle.querySelectorAll(".fmt-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          selectedFmt[group] = btn.dataset.fmt;
        });
      });
    });

    // ── Drop zone ────────────────────────────────────────────────────────────
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("file-input");
    const fileName = document.getElementById("file-name");
    const btnFile = document.getElementById("btn-file");
    let uploadedFile = null;

    function setFile(file) {
      if (!file) return;
      uploadedFile = file;
      fileName.textContent = "✓  " + file.name;
      fileName.classList.add("visible");
      dropzone.classList.add("has-file");
      dropzone.querySelector(".drop-title").textContent = "File ready";
      btnFile.disabled = false;
    }

    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") fileInput.click(); });
    dropzone.addEventListener("dragover", e => { e.preventDefault(); dropzone.classList.add("over"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("over"));
    dropzone.addEventListener("drop", e => {
      e.preventDefault();
      dropzone.classList.remove("over");
      setFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", () => setFile(fileInput.files[0]));

    // ── Helpers ──────────────────────────────────────────────────────────────
    function setLoading(btn, on) {
      btn.classList.toggle("loading", on);
      btn.disabled = on;
    }

    function showStatus(el, msg, kind) {
      el.textContent = msg;
      el.className = "status show " + kind;
      if (kind === "ok") setTimeout(() => el.classList.remove("show"), 3500);
    }

    function sanitizeFilename(name) {
      return name
        .trim()
        .replace(/\.[^/.]+$/, "")        // strip any existing extension
        .replace(/[\\/:*?"<>|]/g, "-")   // strip characters invalid on most filesystems
        .replace(/\s+/g, "-")
        .slice(0, 120);
    }

    async function downloadBlob(response, fmt, desiredName) {
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const base = desiredName && desiredName.length ? desiredName : "output";
      a.download = base + "." + fmt;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    // ── Convert: paste text ──────────────────────────────────────────────────
    document.getElementById("btn-text").addEventListener("click", async () => {
      const content = document.getElementById("md-input").value.trim();
      const status = document.getElementById("status-text");
      const btn = document.getElementById("btn-text");
      const fmt = selectedFmt.text;
      const desiredName = sanitizeFilename(document.getElementById("filename-text").value || "");

      if (!content) { showStatus(status, "Paste some Markdown first.", "err"); return; }

      setLoading(btn, true);
      showStatus(status, "", "");

      try {
        const res = await fetch(`${API_BASE}/convert_text?type=${fmt}`, {
          method: "POST",
          body: content,
          headers: { "Content-Type": "text/plain; charset=utf-8" },
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: "Server error" }));
          throw new Error(err.detail || "Conversion failed");
        }

        await downloadBlob(res, fmt, desiredName);
        showStatus(status, `✓ Downloaded ${desiredName || "output"}.${fmt}`, "ok");
      } catch (e) {
        showStatus(status, "✗ " + e.message, "err");
      } finally {
        setLoading(btn, false);
      }
    });

    // ── Convert: file upload ─────────────────────────────────────────────────
    document.getElementById("btn-file").addEventListener("click", async () => {
      const status = document.getElementById("status-file");
      const btn = document.getElementById("btn-file");
      const fmt = selectedFmt.file;
      const typedName = sanitizeFilename(document.getElementById("filename-file").value || "");
      const fallbackName = uploadedFile ? sanitizeFilename(uploadedFile.name) : "";
      const desiredName = typedName || fallbackName;

      if (!uploadedFile) { showStatus(status, "Upload a .md file first.", "err"); return; }

      setLoading(btn, true);
      showStatus(status, "", "");

      const form = new FormData();
      form.append("file", uploadedFile);

      try {
        const res = await fetch(`${API_BASE}/convert?type=${fmt}`, {
          method: "POST",
          body: form,
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: "Server error" }));
          throw new Error(err.detail || "Conversion failed");
        }

        await downloadBlob(res, fmt, desiredName);
        showStatus(status, `✓ Downloaded ${desiredName || "output"}.${fmt}`, "ok");
      } catch (e) {
        showStatus(status, "✗ " + e.message, "err");
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
